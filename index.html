<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">


        <header>
            <div class="logo">
                <img src="./assets/images/logo.jpeg" alt="icon">
                <h2>Character Counter</h2>
            </div>

            <button class="btn">☀</button>
        </header>


        <section class="hero">
            <h1>Analyze your text</h1>
            <h2>in real-time</h2>
        </section>

        <textarea>
Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.
        </textarea>

        <div class="options">
            <div class="left-options">
                <label>
                    <input type="checkbox">
                    Exclude Spaces
                </label>

                <label>
                    <input type="checkbox">
                    Set Character Limit
                </label>
            </div>

            <p>Approx. reading time: < 1 minute </p>
        </div>


        <section class="cards">

            <div class="card violet">
                <h2>278</h2>
                <p>Total Characters</p>
            </div>

            <div class="card orange">
                <h2>39</h2>
                <p>Word Count</p>
            </div>

            <div class="card coral">
                <h2>04</h2>
                <p>Sentence Count</p>
            </div>

        </section>


        <section class="density">

            <h2>Letter Density</h2>

            <div class="density-item">
                <span>E</span>

                <div class="bar">
                    <div class="file file1"></div>
                </div>

                <p>40 (16.06%)</p>
            </div>

            <div class="density-item">
                <span>I</span>

                <div class="bar">
                    <div class="file file2"></div>
                </div>

                <p>29 (11.65%)</p>
            </div>

            <div class="density-item">
                <span>T</span>

                <div class="bar">
                    <div class="file file3"></div>
                </div>

                <p>28 (11.24%)</p>
            </div>

            <div class="density-item">
                <span>O</span>

                <div class="bar">
                    <div class="file file4"></div>
                </div>

                <p>22 (8.84%)</p>
            </div>

            <div class="density-item">
                <span>N</span>

                <div class="bar">
                    <div class="file file5"></div>
                </div>

                <p>21 (8.43%)</p>
            </div>

            <button class="see-more"> See more🔻</button>


        </section>

    </div>

</body>

</html>
