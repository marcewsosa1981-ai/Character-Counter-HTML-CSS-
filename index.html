<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header>
            <div class="logo">
                <img src="./assets/images/logo.jpeg" alt="icon">
                <h2>Character Counter</h2>
            </div>
            <button class="btn">☀</button>
        </header>

        <section class="hero">
            <h1>Analyze your text</h1>
            <h2>in real-time</h2>
        </section>

        <textarea>
Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction.
A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and
functionality seamlessly.

        </textarea>

        <div class="options">
            <div class="left-options">
                <label>
                    <input type="checkbox-grande">
                    Exclude Spaces
                </label>
                <label type="checkbox-grande">Set Character Limit</label>
            </div>

            <p>Approx. Reading time: < 1 minute</p>
        </div>

    </div>

</body>

</html>
